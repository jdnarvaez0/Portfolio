<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#171717"/>
      <stop offset="50%" style="stop-color:#1f1f1f"/>
      <stop offset="100%" style="stop-color:#262626"/>
    </linearGradient>
    
    <!-- Glow effects -->
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7877c6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7877c6;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)" rx="16"/>
  
  <!-- Decorative glows -->
  <circle cx="1000" cy="100" r="300" fill="url(#glow1)"/>
  <circle cx="200" cy="550" r="200" fill="url(#glow2)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Main content -->
  <text x="80" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#f5f5f5">Juan Narvaez</text>
  <text x="80" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="500" fill="#d1d5db">Software Engineer</text>
  
  <!-- Location -->
  <g transform="translate(80, 310)">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#737373" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
    </svg>
    <text x="32" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#737373">Buenos Aires, Argentina</text>
  </g>
  
  <!-- Tech tags - Row 1 -->
  <g transform="translate(80, 480)">
    <rect x="0" y="0" width="130" height="42" rx="21" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <text x="65" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#f5f5f5" text-anchor="middle">TypeScript</text>
    
    <rect x="146" y="0" width="100" height="42" rx="21" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <text x="196" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#f5f5f5" text-anchor="middle">React</text>
    
    <rect x="262" y="0" width="110" height="42" rx="21" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <text x="317" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#f5f5f5" text-anchor="middle">Node.js</text>
    
    <rect x="388" y="0" width="100" height="42" rx="21" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <text x="438" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#f5f5f5" text-anchor="middle">Next.js</text>
  </g>
  
  <!-- Tech tags - Row 2 -->
  <g transform="translate(80, 535)">
    <rect x="0" y="0" width="100" height="42" rx="21" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <text x="50" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#f5f5f5" text-anchor="middle">NestJS</text>
    
    <rect x="116" y="0" width="130" height="42" rx="21" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <text x="181" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#f5f5f5" text-anchor="middle">PostgreSQL</text>
    
    <rect x="262" y="0" width="90" height="42" rx="21" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)"/>
    <text x="307" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#f5f5f5" text-anchor="middle">Python</text>
  </g>
  
  <!-- URL -->
  <text x="1120" y="556" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#7877c6" text-anchor="end">juannarvaez.dev</text>
</svg>
